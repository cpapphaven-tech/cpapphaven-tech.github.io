name: Daily Weather Fetcher

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC = 7:30 AM IST — fresh for the day
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  contents: write

concurrency:
  group: weather-fetch
  cancel-in-progress: true

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Weather Fetch Script
        run: python scripts/fetch_weather.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add WeatherCommon/weather_data.js

          if git diff --staged --quiet; then
            echo "No weather data changes to commit"
          else
            git commit -m "Auto-update: Daily Weather Data $(date -u '+%Y-%m-%d')"
            git push
          fi
