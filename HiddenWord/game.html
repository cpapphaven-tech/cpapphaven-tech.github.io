<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hidden Word Finder | PlayMixGames</title>
    <meta name="description" content="Find the hidden word specified in the header from the grid.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../loader.css">
    <script src="../sidebar.js"></script>

    <script type="module" src="../analytics.js"></script>
    <script src="../ads.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof prepSystem === "function") {
                prepSystem();
            }
        });
    </script>
</head>

<body>
    <!-- ===== PlayMixGames Universal Loader ===== -->
    <div id="pmg-loader">
        <div class="pmg-brand">PlayMixGames</div>
        <div class="pmg-spinner"></div>
        <div class="pmg-bar-track">
            <div class="pmg-bar-fill"></div>
        </div>
        <p class="pmg-tip">Loading...</p>
    </div>

    <!-- Header -->
    <header>
        <a href="../index.html" class="back-btn">← PlayMixGames</a>
        <h1 class="game-title">FIND WORD</h1>
        <div class="level-display">
            SCORE <span id="current-score">0</span>
        </div>
    </header>

    <!-- Game Container -->
    <div id="game-container">
        <!-- Tutorial Demo -->
        <div id="tutorial-demo" class="tutorial-demo hidden">
            <div class="demo-box">
                <div class="demo-tiles">
                    <div class="tile">F</div>
                    <div class="tile">I</div>
                    <div class="tile">N</div>
                    <div class="tile">D</div>
                </div>
                <p>Drag letters to find words</p>
            </div>
        </div>

        <!-- Target Word Display -->
        <div id="target-display">
            <div id="target-label">Find this word</div>
            <div id="target-word">START</div>
        </div>


        <!-- The Grid -->
        <div id="word-grid-container">
            <canvas id="line-canvas"></canvas>
            <div id="word-grid">
                <!-- Cells generated by JS -->
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">
            <button id="hint-btn" class="control-btn" title="Hint">💡</button>
            <button id="reset-btn" class="control-btn" title="Reset Level">🔄</button>
        </div>

        <!-- Level Complete Screen -->
        <div id="level-complete-screen" class="overlay-screen hidden">
            <div class="screen-content">
                <h1 style="color: var(--h-green); font-size: 2rem; margin-bottom: 10px;">LEVEL CLEARED!</h1>
                <p style="color: #ccc; margin-bottom: 20px;">Great job finding all the words!</p>
                <div style="font-size: 3rem; margin-bottom: 20px;">🎓</div>
                <button id="next-level-btn" class="game-btn">
                    Next Level
                </button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        window.addEventListener('load', function () {
            var loader = document.getElementById('pmg-loader');
            if (loader) {
                var fill = loader.querySelector('.pmg-bar-fill');
                if (fill) fill.style.width = '100%';
                setTimeout(function () { loader.classList.add('hidden'); }, 300);
            }
        });
    </script>
</body>
</html>
