<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Highway Rush: Traffic Dodge</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #222;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            touch-action: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 4px solid #444;
            max-width: 100%; max-height: 100%;
            overflow: hidden;
            background: #333;
        }
        canvas {
            display: block;
            cursor: none;
            max-width: 100vw; max-height: 100vh;
            object-fit: contain;
        }
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        .hud-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #fbbf24; font-weight: 900; margin-bottom: 2px; }
        .hud-value { font-size: 40px; font-weight: 900; color: #fff; font-family: 'Impact', sans-serif; -webkit-text-stroke: 1px #000; }
        
        #game-over {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 4px solid #ef4444;
            border-radius: 20px;
            min-width: 300px;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            z-index: 100;
        }
        .crash-title { color: #ef4444; font-size: 3.5rem; font-weight: 900; margin: 0; text-transform: uppercase; }
        .stats { font-size: 1.2rem; color: #ccc; margin: 20px 0; }
        .stats b { color: #fbbf24; font-size: 2rem; }
        
        button {
            background: #fbbf24;
            border: none;
            color: #000;
            padding: 18px 40px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); background: #f59e0b; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="hud-label">Distance (M)</div>
        <div class="hud-value" id="score">0</div>
        <div style="font-size: 14px; color: #999; margin-top: 8px; font-weight: 700;">RECORD: <span id="highScore">0</span></div>
    </div>
    
    <div id="game-over">
        <h1 class="crash-title">GAME OVER</h1>
        <p class="stats">Total Distance: <b id="finalScore">0</b>m</p>
        <button onclick="resetGame()">Try Again</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('finalScore');

    const width = 400;
    const height = 600;
    canvas.width = width;
    canvas.height = height;

    let score = 0;
    let highScore = localStorage.getItem('highwayRushHi') || 0;
    highScoreEl.innerText = highScore;

    let gameActive = true;
    let enemies = [];
    let particles = [];
    let spawnRate = 1200; 
    let lastSpawn = 0;
    let enemySpeed = 4.5;
    let roadOffset = 0;

    const player = {
        x: width / 2,
        y: height - 100,
        targetX: width / 2,
        w: 40,
        h: 70,
        color: '#ef4444' // Red car
    };

    function updatePlayerPos(e) {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const scaleX = canvas.width / rect.width;
        player.targetX = (clientX - rect.left) * scaleX;
        
        if (player.targetX < 60) player.targetX = 60;
        if (player.targetX > width - 60) player.targetX = width - 60;
    }

    window.addEventListener('mousemove', updatePlayerPos);
    window.addEventListener('touchmove', (e) => { updatePlayerPos(e); e.preventDefault(); }, { passive: false });

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.size = Math.random() * 4 + 2;
            this.life = 1.0;
            this.color = color;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= 0.04; }
        draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); ctx.globalAlpha = 1; }
    }

    class Obstacle {
        constructor() {
            this.type = Math.random() > 0.5 ? 'cone' : 'car';
            this.w = this.type === 'cone' ? 30 : 40;
            this.h = this.type === 'cone' ? 30 : 70;
            this.x = 60 + Math.random() * (width - 120 - this.w);
            this.y = -100;
            this.speed = enemySpeed + Math.random() * 2;
            this.color = this.type === 'cone' ? '#f59e0b' : '#3b82f6'; // Orange cone or blue car
        }
        update() { this.y += this.speed; }
        draw() {
            if (this.type === 'cone') {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x + this.w/2, this.y);
                ctx.lineTo(this.x + this.w, this.y + this.h);
                ctx.lineTo(this.x, this.y + this.h);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + this.w/4, this.y + this.h/2, this.w/2, 5);
            } else {
                drawCar(this.x + this.w/2, this.y + this.h/2, this.color);
            }
        }
    }

    function drawCar(x, y, color) {
        ctx.save();
        ctx.translate(x, y);
        
        // Body
        ctx.fillStyle = color;
        ctx.fillRect(-20, -35, 40, 70);
        
        // Roof
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-15, -10, 30, 30);
        
        // Windows
        ctx.fillStyle = '#88ccff';
        ctx.fillRect(-12, -8, 24, 20);
        
        // Lights
        ctx.fillStyle = '#fff'; // Headlights
        ctx.fillRect(-18, -34, 8, 4);
        ctx.fillRect(10, -34, 8, 4);
        
        ctx.fillStyle = '#ff0000'; // Taillights
        ctx.fillRect(-18, 30, 8, 4);
        ctx.fillRect(10, 30, 8, 4);
        
        // Wheels
        ctx.fillStyle = '#000';
        ctx.fillRect(-22, -25, 4, 15);
        ctx.fillRect(18, -25, 4, 15);
        ctx.fillRect(-22, 10, 4, 15);
        ctx.fillRect(18, 10, 4, 15);

        ctx.restore();
    }

    function animate(timestamp) {
        if (!gameActive) {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,width,height);
            particles.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) particles.splice(i,1); });
            if(particles.length > 0) requestAnimationFrame(animate);
            return;
        }

        // DRAW ROAD THEME
        // Grass
        ctx.fillStyle = '#166534';
        ctx.fillRect(0, 0, width, height);
        
        // Road surface (Asphalt)
        ctx.fillStyle = '#333';
        ctx.fillRect(50, 0, width - 100, height);
        
        // Shoulders
        ctx.fillStyle = '#666';
        ctx.fillRect(50, 0, 10, height);
        ctx.fillRect(width - 60, 0, 10, height);

        // Lane markings
        roadOffset = (timestamp / 2) % 80;
        ctx.fillStyle = '#fbbf24'; // Yellow line
        for (let y = -80 + roadOffset; y < height; y += 80) {
            ctx.fillRect(width/2 - 2, y, 4, 40);
        }

        // Player
        player.x += (player.targetX - player.x) * 0.15;
        drawCar(player.x, player.y, player.color);

        // Spawn traffic
        if (timestamp - lastSpawn > spawnRate) {
            enemies.push(new Obstacle());
            lastSpawn = timestamp;
            if(spawnRate > 400) spawnRate -= 12;
            enemySpeed += 0.06;
        }

        // Logic
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update();
            enemies[i].draw();
            
            // Collision
            if (player.x + player.w/2 > enemies[i].x && player.x - player.w/2 < enemies[i].x + enemies[i].w &&
                player.y + player.h/2 > enemies[i].y && player.y - player.h/2 < enemies[i].y + enemies[i].h) {
                endGame();
            }

            if (enemies[i].y > height) {
                enemies.splice(i, 1);
                score += 10;
                scoreEl.innerText = score;
            }
        }

        particles.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) particles.splice(i,1); });

        requestAnimationFrame(animate);
    }

    function endGame() {
        gameActive = false;
        gameOverEl.style.display = 'block';
        finalScoreEl.innerText = score;
        for(let i=0; i<40; i++) particles.push(new Particle(player.x, player.y, '#000'));
        if(score > highScore) {
            highScore = score;
            localStorage.setItem('highwayRushHi', highScore);
            highScoreEl.innerText = highScore;
        }
    }

    function resetGame() {
        score = 0; scoreEl.innerText = score;
        enemies = []; particles = [];
        spawnRate = 1200; enemySpeed = 4.5;
        gameActive = true;
        gameOverEl.style.display = 'none';
        requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
</script>
</body>
</html>
