<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="../ads.js"></script>
</head>
<body>
    <div id="game-container">
        <!-- Header Section -->
        <div class="header">
            <div class="logo">Minesweeper</div>
            <div class="difficulty-select">
                <button id="btn-easy" class="btn active" data-diff="easy">Easy</button>
                <button id="btn-medium" class="btn" data-diff="medium">Medium</button>
                <button id="btn-hard" class="btn" data-diff="hard">Hard</button>
            </div>
        </div>

        <!-- HUD Statistics -->
        <div class="hud">
            <div class="hud-item">
                <span class="icon">💣</span>
                <span id="mine-count" class="hud-value">010</span>
            </div>
            <div id="btn-face" class="face-btn">😊</div>
            <div class="hud-item">
                <span class="icon">⏱️</span>
                <span id="timer" class="hud-value">000</span>
            </div>
        </div>

        <!-- Touch Controls for Mobile -->
        <div class="mobile-controls">
            <button id="btn-mode-dig" class="btn-control active">
                <span class="mode-icon">⛏️</span> Dig Mode
            </button>
            <button id="btn-mode-flag" class="btn-control">
                <span class="mode-icon">🚩</span> Flag Mode
            </button>
        </div>

        <!-- Board Area -->
        <div class="board-outer-wrapper">
            <div class="board-scroll-container">
                <div id="board" class="board">
                    <!-- Dynamic Grid Generated by JS -->
                </div>
            </div>
        </div>

        <!-- Bottom Controls / Info -->
        <div class="bottom-actions">
            <button id="btn-sound" class="action-btn">🔊 Sound On</button>
        </div>

        <!-- End Game Modal -->
        <div id="end-modal" class="modal-overlay">
            <div class="modal-content">
                <h2 id="modal-title" class="modal-title">Victory!</h2>
                <p id="modal-desc" class="modal-desc">You swept all the mines in 45 seconds.</p>
                <button id="modal-btn-restart" class="btn-modal">Play Again</button>
            </div>
        </div>

        <!-- Bottom Ad Banner (reserves space matching ads.js) -->
        <div id="bottom-ad"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof prepSystem === "function") {
                prepSystem();
            }
        });
    </script>
    <script src="game.js"></script>
</body>
</html>
