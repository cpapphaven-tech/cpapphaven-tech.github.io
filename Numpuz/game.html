<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Numpuz</title>
    <style>
        :root {
            --bg-color: #f4e1c1;
            --wood-dark: #6e4b31;
            --wood-medium: #8b5a2b;
            --wood-light: #c99f6b;
            --text-light: #fef4e8;
            --board-bg: #4a3219;
            --board-border: #331d0b;
        }
        
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--wood-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(244, 225, 193, 0.9), rgba(244, 225, 193, 0.9)), url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="%23f4e1c1"/><path d="M0 0l100 100M100 0L0 100" stroke="%23ebd5ae" stroke-width="2"/></svg>');
            overflow: hidden;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--wood-medium);
            color: var(--text-light);
            border-bottom: 4px solid var(--wood-dark);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-size: 16px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .stat-value {
            font-weight: bold;
            font-family: monospace;
            font-size: 18px;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            padding: 10px;
        }

        .board-container {
            background-color: var(--board-bg);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 0 10px rgba(0,0,0,0.8);
            border: 8px solid var(--board-border);
            margin-bottom: 20px;
        }

        .board {
            position: relative;
            background-color: #2a1b0d;
            border-radius: 4px;
        }

        .tile {
            position: absolute;
            background: linear-gradient(135deg, var(--wood-light), #a67b45);
            border: 2px solid var(--wood-dark);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            font-weight: bold;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.3), inset -2px -2px 5px rgba(0,0,0,0.5), 2px 2px 5px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.15s ease-in-out, left 0.15s ease-out, top 0.15s ease-out;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .tile:active {
            transform: scale(0.95);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            padding: 0 20px;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .diff-btn {
            background: var(--wood-light);
            border: 2px solid var(--wood-dark);
            color: var(--wood-dark);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--wood-dark);
            transition: all 0.1s;
        }

        .diff-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--wood-dark);
        }

        .diff-btn.active {
            background: var(--wood-medium);
            color: var(--text-light);
            border-color: var(--board-border);
            box-shadow: 0 4px 0 var(--board-border);
        }
        
        .diff-btn.active:active {
            box-shadow: 0 0 0 var(--board-border);
        }

        .action-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .action-btn {
            background: #4caf50;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #2e7d32;
            transition: all 0.1s;
            flex: 1;
            max-width: 200px;
        }

        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #2e7d32;
        }

        .action-btn.reset {
            background: #f44336;
            box-shadow: 0 6px 0 #b71c1c;
        }
        
        .action-btn.reset:active {
            box-shadow: 0 0 0 #b71c1c;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--bg-color);
            padding: 30px;
            border-radius: 15px;
            border: 4px solid var(--wood-dark);
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s;
            max-width: 90%;
            width: 320px;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal-title {
            font-size: 28px;
            color: var(--wood-medium);
            margin-bottom: 10px;
        }

        .modal-text {
            font-size: 18px;
            margin-bottom: 20px;
        }

        @media (max-width: 400px) {
            .diff-btn {
                padding: 6px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="title">Numpuz</div>
        <div class="stats">
            <div class="stat-box">
                <span class="stat-label">MOVES</span>
                <span class="stat-value" id="moves-count">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">TIME</span>
                <span class="stat-value" id="timer">00:00</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="board-container">
            <div class="board" id="board"></div>
        </div>

        <div class="controls">
            <div class="difficulty-selector" id="difficulty-selector">
                <button class="diff-btn active" data-size="3">3x3</button>
                <button class="diff-btn" data-size="4">4x4</button>
                <button class="diff-btn" data-size="5">5x5</button>
                <button class="diff-btn" data-size="6">6x6</button>
                <button class="diff-btn" data-size="7">7x7</button>
                <button class="diff-btn" data-size="8">8x8</button>
            </div>
            
            <div class="action-btns">
                <button class="action-btn reset" id="reset-btn">Reset</button>
                <button class="action-btn" id="new-game-btn">New Game</button>
            </div>
        </div>
    </div>

    <div class="modal" id="win-modal">
        <div class="modal-content">
            <h2 class="modal-title">You Win!</h2>
            <p class="modal-text" id="win-message">Solved in X moves and Y time.</p>
            <button class="action-btn" id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
