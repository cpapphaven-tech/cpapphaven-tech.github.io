<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Klondike Solitaire</title>
    <link rel="stylesheet" href="style.css">
    <script src="../ads.js"></script>
    <script type="module" src="../analytics.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <a href="../index.html" class="back-btn">← Back</a>
            <h1>♠ Klondike Solitaire ♥</h1>
            <div class="stats">
                <div class="stat-box">Score: <span id="score">0</span></div>
                <div class="stat-box">Moves: <span id="moves">0</span></div>
                <div class="stat-box">Time: <span id="time">0:00</span></div>
            </div>
            <div class="controls">
                <button onclick="game.newGame()">New Game</button>
                <button onclick="game.autoMove()">Auto Move</button>
                <button onclick="game.undo()">Undo</button>
            </div>
        </div>

        <div class="top-row">
            <div class="stock-pile" id="stock" onclick="game.drawFromStock()">
                <span>🔄</span>
            </div>
            <div class="waste-pile" id="waste"></div>
            <div style="grid-column: span 1;"></div>
            <div class="foundation" id="foundation-0" data-suit="hearts">
                <span class="foundation-label">♥</span>
            </div>
            <div class="foundation" id="foundation-1" data-suit="diamonds">
                <span class="foundation-label">♦</span>
            </div>
            <div class="foundation" id="foundation-2" data-suit="clubs">
                <span class="foundation-label">♣</span>
            </div>
            <div class="foundation" id="foundation-3" data-suit="spades">
                <span class="foundation-label">♠</span>
            </div>
        </div>

        <div class="board">
            <div class="tableau" id="tableau-0"></div>
            <div class="tableau" id="tableau-1"></div>
            <div class="tableau" id="tableau-2"></div>
            <div class="tableau" id="tableau-3"></div>
            <div class="tableau" id="tableau-4"></div>
            <div class="tableau" id="tableau-5"></div>
            <div class="tableau" id="tableau-6"></div>
        </div>
    </div>

    <div class="win-overlay" id="winOverlay">
        <div class="win-text">🎉 You Win! 🎉</div>
        <div class="win-stats">
            Score: <span id="winScore">0</span> | Moves: <span id="winMoves">0</span> | Time: <span id="winTime">0:00</span>
        </div>
        <button onclick="game.newGame(); document.getElementById('winOverlay').classList.remove('show');">Play Again</button>
    </div>

    <div class="hint" id="hint"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof prepSystem === "function") {
                prepSystem();
            }
        });
    </script>
    <script src="game.js"></script>
</body>
</html>
